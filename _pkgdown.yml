url: https://drjoshmcgrane.github.io/rasch/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    preset: bootstrap
    primary: "#1d3557"
    bg: "#ffffff"
    fg: "#1e293b"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Sans 3"}
    code_font: {google: "JetBrains Mono"}
    pkgdown-nav-height: 72px

home:
  title: rasch — Rasch Measurement Theory in R
  description: >
    Pairwise conditional estimation of the Rasch model family — partial
    credit, rating scale, many-facet, extended frame of reference, and
    Bradley-Terry-Luce paired comparisons — with the complete diagnostic
    apparatus of published Rasch Measurement Theory and a Shiny interface
    that attaches reproducing R code to every output.
  sidebar:
    structure: [links, license, citation, authors, dev]
    components:
      # custom links: this package is not on CRAN, and pkgdown's automatic
      # "View on CRAN" would point at an unrelated package of the same name
      links:
        title: Links
        text: |
          [Browse source code](https://github.com/drjoshmcgrane/rasch)

          [Report a bug](https://github.com/drjoshmcgrane/rasch/issues)

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html

news:
  cran_dates: false

articles:
- title: Articles
  contents:
  - plant-and-detect

reference:
- title: Estimation
  desc: >
    Pairwise conditional estimation of the Rasch model family, with Godambe
    sandwich standard errors and Warm person measures.
  contents:
  - rasch
  - rasch_mfrm
  - rasch_efrm
  - pcml
  - pcml_pc
  - threshold_index
  - item_moments

- title: Test of fit and comparison
  desc: >
    The fit-residual and chi-square apparatus, targeting and reliability,
    and model comparison.
  contents:
  - fit_summary_table
  - targeting_table
  - chisq_detail
  - test_information
  - lr_test
  - compare_fits
  - guttman_table

- title: Persons
  contents:
  - person_wle
  - person_extrapolated
  - score_table

- title: Invariance and DIF
  desc: >
    Differential item functioning over any number of person factors, DIF
    magnitudes in logits, resolution by item splitting, and equating.
  contents:
  - dif_anova
  - dif_contrasts
  - dif_size
  - split_items
  - resolve_dif
  - equate_tests
  - tailored_analysis

- title: Independence and dimensionality
  desc: >
    Residual principal components, the Smith t-test with magnitude
    estimation, Q3 local dependence, and the structural remedies.
  contents:
  - residual_correlations
  - residual_pca
  - dimensionality_test
  - dimensionality_magnitude
  - dependence_magnitude
  - spread_test
  - combine_items
  - rack_data
  - stack_data

- title: Multiple choice and traditional statistics
  contents:
  - distractor_analysis
  - distractor_rescore
  - ctt_table

- title: Paired comparisons
  desc: >
    The Bradley-Terry-Luce model as the conditional form of the dichotomous
    Rasch model, with judge diagnostics, within-judge dependence, judge-group
    DIF, and the pair-structure analogues of the independence diagnostics
    (transitivity and the residual bimension decomposition).
  contents:
  - btl
  - btl_dif
  - btl_transitivity
  - btl_dimensionality
  - btl_equate
  - btl_information
  - btl_next_pairs
  - judge_surprise
  - judge_pair_surprise
  - plot_btl
  - plot_btl_categories
  - plot_btl_icc
  - plot_btl_dependence
  - plot_btl_transitivity
  - plot_btl_scree
  - plot_btl_dim_map
  - plot_btl_judge_map
  - plot_btl_equate
  - plot_btl_targeting

- title: Plots
  desc: One plotting function per display, all base graphics.
  contents:
  - starts_with("plot_")
  - -starts_with("plot_btl")

- title: Data simulation
  desc: >
    Generate data from each model family with dial-in departures from it, so a
    known pathology can be planted and the matching diagnostic watched as it
    fires. The true parameters are attached to every result.
  contents:
  - simulate_rasch
  - simulate_btl
  - simulate_mfrm
  - simulate_efrm
  - sim_replicate
  - sim_recovery
  - plot_recovery

- title: Export and interface
  contents:
  - save_outputs
  - save_item_plots
  - save_person_plots
  - report_html
  - run_app
